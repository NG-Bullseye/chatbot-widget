# Per-customer config reference. Values map to environment variables
# (see backend/.env.example) and widget data-* attributes. Copy to
# customer.<name>.yaml and fill in. Nothing here is read at runtime directly --
# it documents what to set per deployment so the codebase stays agnostic.

customer: example-co

llm:
  model: deepseek-chat
  base_url: https://api.deepseek.com/v1
  # api_key -> LLM_API_KEY (secret, not in yaml)

system_prompt: >
  Du bist der Support-Assistent von Example Co. Beantworte Fragen zu Produkten,
  Bestellungen und Konto freundlich und kurz.

widget:
  position: right          # slide-out side
  accent: "#2563eb"        # brand color
  title: "Example Co Support"
  greeting: "Hallo! Wie kann ich helfen?"

backend_url: https://chat.example.com
allowed_origins:
  - https://www.example.com
